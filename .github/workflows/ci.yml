name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check extension
        run: npx tsc -p tsconfig.json --noEmit

      - name: Bundle webviews
        run: node esbuild.mjs --minify

      - name: Build Tailwind CSS
        run: npx @tailwindcss/cli -i src/webviews/styles/globals.css -o media/webview.css --minify

      - name: Lint
        run: npm run lint
